name: Publish confirmed version

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: false

      - name: Test
        run: |
          go test ./...
          go vet ./...

      - name: Build Windows package
        shell: bash
        run: |
          VERSION="$(cat VERSION)"
          PACKAGE="BiliQueue-v${VERSION}-windows"
          SOURCE_PACKAGE="BiliQueue-v${VERSION}-source.zip"
          mkdir -p "dist/${PACKAGE}/data" "dist/${PACKAGE}/fonts" "dist/${PACKAGE}/assets"
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-H=windowsgui -s -w" -o "dist/${PACKAGE}/BiliQueue-windows-amd64.exe" .
          python3 tools/embed_icon_pe.py "dist/${PACKAGE}/BiliQueue-windows-amd64.exe" assets/biliqueue.ico "dist/${PACKAGE}/BiliQueue-windows-amd64-icon.exe"
          mv "dist/${PACKAGE}/BiliQueue-windows-amd64-icon.exe" "dist/${PACKAGE}/BiliQueue-windows-amd64.exe"
          cp "start-BiliQueue.cmd" "dist/${PACKAGE}/"
          cp README.md "dist/${PACKAGE}/README.md"
          cp -a assets/. "dist/${PACKAGE}/assets/"
          touch "dist/${PACKAGE}/data/.gitkeep" "dist/${PACKAGE}/fonts/.gitkeep"
          (cd dist && zip -qr "../${PACKAGE}.zip" "${PACKAGE}")
          zip -qr "${SOURCE_PACKAGE}" .             -x '.git/*'             -x 'dist/*'             -x 'build/*'             -x '*.exe'             -x '*.zip'             -x 'data/logs/*'             -x 'data/auth.json'             -x 'data/config.json'             -x 'data/queue-today.json'             -x 'data/avatars/*'             -x 'data/backups/*'             -x 'fonts/*.ttf'             -x 'fonts/*.otf'             -x 'fonts/*.woff'             -x 'fonts/*.woff2'

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="$(cat VERSION)"
          TAG="v${VERSION}"
          WINDOWS_ASSET="BiliQueue-v${VERSION}-windows.zip"
          SOURCE_ASSET="BiliQueue-v${VERSION}-source.zip"
          awk 'BEGIN{seen=0} /^---[[:space:]]*$/{if(seen){exit}} {print; seen=1}' RELEASE_NOTES.md > release-notes-current.md
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$WINDOWS_ASSET" "$SOURCE_ASSET" --clobber
            gh release edit "$TAG" --notes-file release-notes-current.md
          else
            gh release create "$TAG" "$WINDOWS_ASSET" "$SOURCE_ASSET"               --target main               --title "BiliQueue ${TAG}"               --notes-file release-notes-current.md
          fi
